<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warframe Mastery Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c8a951;
  --gold-bright: #f0cc6e;
  --teal: #4ecdc4;
  --teal-dim: #2a7a76;
  --bg: #080c10;
  --bg2: #0d1219;
  --bg3: #111820;
  --text: #c8d4e0;
  --text-dim: #6b7f94;
  --border: rgba(200,169,81,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 16px; min-height: 100vh; }
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(78,205,196,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(78,205,196,0.025) 1px, transparent 1px);
  background-size: 36px 36px; pointer-events: none; z-index: 0;
}
.app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* SIDEBAR */
.sidebar {
  width: 230px; flex-shrink: 0; background: var(--bg2);
  border-right: 1px solid var(--border); padding: 24px 0;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
  display: flex; flex-direction: column;
}
.sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.sidebar-logo h1 { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 900; letter-spacing: 3px; color: var(--gold-bright); line-height: 1.4; }
.sidebar-logo p { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

.nav-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 20px; cursor: pointer; transition: all 0.15s;
  border-left: 2px solid transparent; font-size: 13px; font-weight: 600; letter-spacing: 1px; color: var(--text-dim);
}
.nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
.nav-item.active { color: var(--gold-bright); border-left-color: var(--gold); background: rgba(200,169,81,0.05); }
.nav-badge { font-family: 'Orbitron', monospace; font-size: 10px; padding: 2px 6px; background: rgba(255,255,255,0.05); border-radius: 2px; color: var(--text-dim); white-space: nowrap; }
.nav-item.active .nav-badge { background: rgba(200,169,81,0.15); color: var(--gold); }

.sidebar-footer { margin-top: auto; padding: 20px; border-top: 1px solid var(--border); }
.total-bar-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; display: flex; justify-content: space-between; }
.total-bar-wrap { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
.total-bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal-dim), var(--teal)); border-radius: 2px; transition: width 0.4s ease; box-shadow: 0 0 8px rgba(78,205,196,0.4); }
.data-source { font-size: 10px; letter-spacing: 1px; color: var(--text-dim); opacity: 0.6; }
.data-source span { color: var(--teal); }

/* MAIN */
.main { flex: 1; padding: 32px; min-width: 0; }
.top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-wrap input {
  width: 100%; background: var(--bg2); border: 1px solid rgba(255,255,255,0.07); border-radius: 3px;
  padding: 9px 14px 9px 36px; color: var(--text); font-family: 'Rajdhani', sans-serif;
  font-size: 14px; font-weight: 500; letter-spacing: 1px; outline: none; transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: rgba(78,205,196,0.3); }
.search-wrap input::placeholder { color: var(--text-dim); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 13px; }

.filter-btns { display: flex; gap: 6px; }
.filter-btn {
  font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase; padding: 8px 14px;
  border-radius: 2px; border: 1px solid rgba(255,255,255,0.08);
  background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
.filter-btn.active { border-color: var(--teal-dim); color: var(--teal); background: rgba(78,205,196,0.07); }

.cat-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.cat-title { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); white-space: nowrap; }
.cat-divider { flex: 1; height: 1px; background: var(--border); }
.cat-stats { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; white-space: nowrap; }

.item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 6px; margin-bottom: 36px; }
.item-card {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  background: var(--bg2); border: 1px solid rgba(255,255,255,0.04); border-radius: 3px;
  cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden;
}
.item-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: transparent; transition: background 0.15s; }
.item-card:hover { background: var(--bg3); border-color: rgba(255,255,255,0.07); }
.item-card.mastered { background: rgba(78,205,196,0.04); border-color: rgba(78,205,196,0.1); }
.item-card.mastered::before { background: var(--teal); }

.cb { width: 15px; height: 15px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.mastered .cb { background: var(--teal); border-color: var(--teal); }
.cb svg { width: 9px; height: 9px; opacity: 0; transition: opacity 0.15s; }
.mastered .cb svg { opacity: 1; }
.item-name { font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: color 0.15s; flex: 1; }
.mastered .item-name { color: var(--text-dim); }

.vaulted-badge {
  font-family: 'Orbitron', monospace; font-size: 8px; letter-spacing: 1px;
  padding: 1px 4px; border-radius: 2px; flex-shrink: 0; white-space: nowrap;
  background: rgba(200,169,81,0.08); border: 1px solid rgba(200,169,81,0.3); color: var(--gold);
}

/* Loading */
.loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; gap: 16px; }
.spinner { width: 32px; height: 32px; border: 2px solid rgba(78,205,196,0.1); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 3px; color: var(--text-dim); animation: pulse 1.5s ease infinite; }
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

.notice { font-size: 12px; letter-spacing: 1px; color: var(--text-dim); padding: 8px 12px; background: rgba(78,205,196,0.05); border: 1px solid rgba(78,205,196,0.1); border-radius: 3px; margin-bottom: 20px; }
.notice b { color: var(--teal); }
.empty-state { text-align: center; padding: 60px 0; color: var(--text-dim); font-size: 14px; }

/* Kuva / Tenet badges */
.kuva-badge {
  font-family: 'Orbitron', monospace; font-size: 8px; letter-spacing: 1px;
  padding: 1px 4px; border-radius: 2px; flex-shrink: 0; white-space: nowrap;
  background: rgba(220,80,40,0.1); border: 1px solid rgba(220,80,40,0.35); color: #e05530;
}
.tenet-badge {
  font-family: 'Orbitron', monospace; font-size: 8px; letter-spacing: 1px;
  padding: 1px 4px; border-radius: 2px; flex-shrink: 0; white-space: nowrap;
  background: rgba(120,80,220,0.1); border: 1px solid rgba(140,90,240,0.35); color: #a070f0;
}

/* Export / Import */
.io-btns { display: flex; gap: 6px; margin-top: 10px; }
.io-btn {
  flex: 1; font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase; padding: 6px 8px;
  border-radius: 2px; border: 1px solid rgba(255,255,255,0.08);
  background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.15s; text-align: center;
}
.io-btn:hover { border-color: rgba(78,205,196,0.3); color: var(--teal); }

/* Lich element tracker */
.lich-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 36px; }
.lich-row {
  background: var(--bg2); border: 1px solid rgba(255,255,255,0.04); border-radius: 3px;
  padding: 10px 14px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.lich-name { font-size: 13px; font-weight: 600; color: var(--text); min-width: 160px; }
.elem-wrap { display: flex; gap: 5px; flex-wrap: wrap; }
.elem-dot {
  font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
  padding: 2px 6px; border-radius: 2px; cursor: pointer; transition: all 0.15s; user-select: none;
  border: 1px solid rgba(255,255,255,0.08); color: var(--text-dim); background: transparent;
}
.elem-dot:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.elem-dot.owned { border-color: var(--teal-dim); color: var(--teal); background: rgba(78,205,196,0.08); }

/* Mobile */
.hamburger {
  display: none; position: fixed; top: 14px; left: 14px; z-index: 200;
  width: 36px; height: 36px; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 3px; cursor: pointer; align-items: center; justify-content: center; flex-direction: column; gap: 4px;
}
.hamburger span { display: block; width: 16px; height: 2px; background: var(--text-dim); border-radius: 1px; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
@media (max-width: 640px) {
  .sidebar { position: fixed; left: -230px; top: 0; height: 100vh; z-index: 100; transition: left 0.25s ease; }
  .sidebar.open { left: 0; }
  .sidebar-overlay.open { display: block; }
  .hamburger { display: flex; }
  .main { padding: 16px; padding-top: 56px; }
}
</style>
</head>
<body>
<button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
  <span></span><span></span><span></span>
</button>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>MASTERY<br>CHECKLIST</h1>
      <p>Warframe</p>
    </div>
    <div id="navItems"></div>
    <div class="sidebar-footer">
      <div class="total-bar-label">
        <span>Total Progress</span>
        <span id="totalLabel">0%</span>
      </div>
      <div class="total-bar-wrap">
        <div class="total-bar-fill" id="totalBar" style="width:0%"></div>
      </div>
      <div class="data-source" id="mrEstimate" style="margin-bottom:4px"></div>
      <div class="data-source" id="dataSource">Source: <span>loading...</span></div>
      <div class="io-btns">
        <button class="io-btn" onclick="exportData()">Export</button>
        <button class="io-btn" onclick="document.getElementById('importFile').click()">Import</button>
      </div>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </nav>

  <main class="main">
    <div class="top-bar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Search items..." oninput="renderItems()">
      </div>
      <div class="filter-btns">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('unmastered',this)">Missing</button>
        <button class="filter-btn" onclick="setFilter('mastered',this)">Mastered</button>
      </div>
    </div>
    <div id="notice"></div>
    <div id="content">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Connecting to Lotus...</div>
      </div>
    </div>
  </main>
</div>

// ─── MR XP per category ──────────────────────────────────────────────────────
const MR_XP = { Warframes: 6000, Necramech: 6000, Archwing: 6000, Companion: 6000, Robotic: 6000 };
function getMasteredXP() {
  let xp = 0;
  for (const [k, items] of Object.entries(DATA)) {
    const perItem = MR_XP[k] || 3000;
    xp += items.filter(i => mastered[i.id]).length * perItem;
  }
  return xp;
}
function xpToMR(xp) {
  return Math.floor((-1 + Math.sqrt(1 + 4 * xp / 750)) / 2);
}

  { key: 'kuva',       label: 'Kuva',        apiCat: null, prefix: 'Kuva ' },
  { key: 'tenet',      label: 'Tenet',       apiCat: null, prefix: 'Tenet ' },
  { key: 'lich',       label: 'Lich Vault',  apiCat: null, lichView: true },
];

// ─── State ────────────────────────────────────────────────────────────────────
let DATA = {};           // populated after load
let dataSource = 'fallback';
let mastered = JSON.parse(localStorage.getItem('wf_mastery3') || '{}');
let lichData = JSON.parse(localStorage.getItem('wf_lich') || '{}');
let activeCat = 'all';
let activeFilter = 'all';

// ─── Load data ────────────────────────────────────────────────────────────────
async function loadData() {
  // Check cache first (24h)
  try {
    const cached = localStorage.getItem('wf_api_cache');
    const cachedTime = parseInt(localStorage.getItem('wf_api_cache_time') || '0');
    if (cached && Date.now() - cachedTime < 86400000) {
      DATA = JSON.parse(cached);
      dataSource = 'api (cached)';
      onReady();
      return;
    }
  } catch(e) {}

  // Try API
  try {
    const res = await Promise.race([
      fetch('https://api.warframestat.us/items?only=name,category,uniqueName,vaulted'),
      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000))
    ]);
    if (!res.ok) throw new Error('bad response');
    const raw = await res.json();
    DATA = processApiData(raw);
    localStorage.setItem('wf_api_cache', JSON.stringify(DATA));
    localStorage.setItem('wf_api_cache_time', Date.now().toString());
    dataSource = 'api (live)';
    onReady();
  } catch(e) {
    // Fallback to hardcoded
    DATA = buildFromFallback();
    dataSource = 'offline (built-in)';
    document.getElementById('notice').innerHTML = `
      <div class="notice">
        <b>Offline mode</b> — Could not reach the Warframe API. Using built-in data. 
        Open via a local server (python -m http.server) or host online for live API data.
      </div>`;
    onReady();
  }
}

// Convert raw API array → { categoryKey: [{name, id, vaulted}] }
function processApiData(raw) {
  const skipWords = ['Blueprint','Neuroptics','Chassis','Systems','Barrel','Receiver',
    'Stock','Blade','Hilt','Gauntlet','Carapace','Cerebrum','Pouch','Guard',
    'Grip','String','Lower Limb','Upper Limb','Disc','Handle','Ornament','Buckle','Band',
    'Collar','Feathers','Wings','Tail','Mane'];

  // Build lookup: apiCat → [categoryEntry], sub-categories (with uMatch) first
  const byApiCat = {};
  for (const c of CATS.slice(1)) {
    if (!c.apiCat) continue;
    if (!byApiCat[c.apiCat]) byApiCat[c.apiCat] = [];
    byApiCat[c.apiCat].push(c);
  }
  for (const list of Object.values(byApiCat)) {
    list.sort((a, b) => (b.uMatch ? 1 : 0) - (a.uMatch ? 1 : 0));
  }

  const out = {};
  CATS.slice(1).forEach(c => out[c.key] = []);
  const seen = new Set();

  for (const item of raw) {
    const candidates = byApiCat[item.category];
    if (!candidates) continue;
    if (!item.name || item.name.trim() === '') continue;
    if (skipWords.some(w => item.name.includes(w))) continue;
    const nameKey = item.name.toLowerCase();
    if (seen.has(nameKey)) continue;
    seen.add(nameKey);

    const uLower = (item.uniqueName || '').toLowerCase();
    // Sub-categories checked first (they have uMatch), then parent category
    const cat = candidates.find(c => c.uMatch
      ? (Array.isArray(c.uMatch) ? c.uMatch.some(m => uLower.includes(m)) : uLower.includes(c.uMatch.toLowerCase()))
      : true);
    if (!cat) continue;
    out[cat.key].push({ name: item.name, id: item.uniqueName || item.name, vaulted: item.vaulted === true });
  }

  // If API returned nothing for a category, use fallback data
  CATS.slice(1).forEach(c => {
    if (out[c.key].length === 0 && FALLBACK[c.key]) {
      out[c.key] = FALLBACK[c.key].map(name => ({ name, id: name, vaulted: false }));
    }
  });

  Object.keys(out).forEach(k => out[k].sort((a, b) => a.name.localeCompare(b.name)));
  return out;
}

function buildFromFallback() {
  const out = {};
  CATS.slice(1).forEach(c => {
    out[c.key] = (FALLBACK[c.key] || []).map(name => ({ name, id: name, vaulted: false }));
  });
  return out;
}

function onReady() {
  document.getElementById('dataSource').innerHTML = `Source: <span>${dataSource}</span>`;
  buildNav();
  renderItems();
}

// ─── Nav ──────────────────────────────────────────────────────────────────────
function getItems(catKey) {
  const cat = CATS.find(c => c.key === catKey);
  if (cat && cat.prefix) {
    const all = Object.entries(DATA).flatMap(([k, items]) => items.map(i => ({ ...i, cat: k })));
    const seen = new Set();
    return all.filter(i => {
      if (!i.name.startsWith(cat.prefix) || seen.has(i.id)) return false;
      seen.add(i.id); return true;
    });
  }
  if (catKey === 'all') return Object.entries(DATA).flatMap(([k, items]) => items.map(i => ({ ...i, cat: k })));
  return (DATA[catKey] || []).map(i => ({ ...i, cat: catKey }));
}

function buildNav() {
  document.getElementById('navItems').innerHTML = CATS.map(cat => {
    let badge = '';
    if (cat.lichView) {
      const lichWeapons = getLichWeapons();
      const total = lichWeapons.length * LICH_ELEMENTS.length;
      const owned = lichWeapons.reduce((sum, w) => sum + (lichData[w] ? Object.values(lichData[w]).filter(Boolean).length : 0), 0);
      badge = `${owned}/${total}`;
    } else {
      const items = getItems(cat.key);
      const done = items.filter(i => mastered[i.id]).length;
      badge = `${done}/${items.length}`;
    }
    return `<div class="nav-item ${activeCat === cat.key ? 'active' : ''}" onclick="setCategory('${cat.key}')">
      <span>${cat.label}</span>
      <span class="nav-badge">${badge}</span>
    </div>`;
  }).join('');
  updateTotal();
}

function updateTotal() {
  const all = getItems('all');
  const done = all.filter(i => mastered[i.id]).length;
  const missing = all.length - done;
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  document.getElementById('totalBar').style.width = pct + '%';
  document.getElementById('totalLabel').textContent = pct + '%';
  document.title = missing > 0 ? `(${missing} missing) Warframe Mastery` : 'Warframe Mastery ✓';
  const xp = getMasteredXP();
  const mr = xpToMR(xp);
  const nextXP = 750 * (mr + 1) * (mr + 2);
  document.getElementById('mrEstimate').textContent = `~MR ${mr} (${xp.toLocaleString()} XP · ${(nextXP - xp).toLocaleString()} to next)`;
}

// ─── Lich helpers ─────────────────────────────────────────────────────────────
function getLichWeapons() {
  return Object.values(DATA).flat()
    .filter(i => i.name.startsWith('Kuva ') || i.name.startsWith('Tenet '))
    .map(i => i.name)
    .filter((v, i, a) => a.indexOf(v) === i)
    .sort();
}
function toggleElem(weapon, elem) {
  if (!lichData[weapon]) lichData[weapon] = {};
  lichData[weapon][elem] = !lichData[weapon][elem];
  localStorage.setItem('wf_lich', JSON.stringify(lichData));
  buildNav();
  renderItems();
}
function renderLich() {
  const weapons = getLichWeapons();
  if (!weapons.length) { document.getElementById('content').innerHTML = '<div class="empty-state">No Kuva or Tenet weapons found in current data.</div>'; return; }
  const html = `
    <div class="cat-header">
      <span class="cat-title">Lich Vault</span>
      <div class="cat-divider"></div>
      <span class="cat-stats">Track which elements you've obtained</span>
    </div>
    <div class="lich-list">
      ${weapons.map(w => {
        const owned = lichData[w] || {};
        const badge = w.startsWith('Kuva ') ? '<span class="kuva-badge">KUVA</span>' : '<span class="tenet-badge">TENET</span>';
        const dots = LICH_ELEMENTS.map(e => {
          const cls = owned[e] ? 'owned' : '';
          return `<span class="elem-dot ${cls}" onclick="toggleElem('${w.replace(/'/g,"\\'")}','${e}')">${e}</span>`;
        }).join('');
        return `<div class="lich-row">${badge}<span class="lich-name">${w}</span><div class="elem-wrap">${dots}</div></div>`;
      }).join('')}
    </div>`;
  document.getElementById('content').innerHTML = html;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderItems() {
  if (activeCat === 'lich') { renderLich(); return; }
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  // Global search: pull from all categories when a search term is active
  let items = getItems(search ? 'all' : activeCat);
  if (search) items = items.filter(i => i.name.toLowerCase().includes(search));
  if (activeFilter === 'mastered')   items = items.filter(i =>  mastered[i.id]);
  if (activeFilter === 'unmastered') items = items.filter(i => !mastered[i.id]);

  if (!items.length) {
    document.getElementById('content').innerHTML = '<div class="empty-state">No items found.</div>';
    return;
  }

  const showGrouped = activeCat === 'all' || search;
  if (showGrouped) {
    let html = '';
    for (const cat of CATS.slice(1)) {
      if (cat.prefix || cat.lichView) continue; // skip virtual views in grouped display
      const catItems = items.filter(i => i.cat === cat.key);
      if (!catItems.length) continue;
      const done = catItems.filter(i => mastered[i.id]).length;
      html += `<div class="cat-header">
        <span class="cat-title">${cat.label}</span>
        <div class="cat-divider"></div>
        <span class="cat-stats">${done} / ${catItems.length}</span>
      </div>
      <div class="item-grid">${catItems.map(cardHtml).join('')}</div>`;
    }
    document.getElementById('content').innerHTML = html || '<div class="empty-state">No items found.</div>';
  } else {
    const cat = CATS.find(c => c.key === activeCat) || { label: 'Results' };
    const done = items.filter(i => mastered[i.id]).length;
    document.getElementById('content').innerHTML = `
      <div class="cat-header">
        <span class="cat-title">${cat.label}</span>
        <div class="cat-divider"></div>
        <span class="cat-stats">${done} / ${items.length}</span>
      </div>
      <div class="item-grid">${items.map(cardHtml).join('')}</div>`;
  }
}

function cardHtml(item) {
  const done = mastered[item.id] ? 'mastered' : '';
  const safeId = item.id.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const vBadge = item.vaulted ? '<span class="vaulted-badge">VAULT</span>' : '';
  const wBadge = item.name.startsWith('Kuva ') ? '<span class="kuva-badge">KUVA</span>'
               : item.name.startsWith('Tenet ') ? '<span class="tenet-badge">TENET</span>' : '';
  return `<div class="item-card ${done}" onclick="toggle('${safeId}')">
    <div class="cb">
      <svg viewBox="0 0 12 12" fill="none">
        <polyline points="1.5,6 4.5,9.5 10.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="item-name">${item.name}</span>
    ${wBadge}${vBadge}
  </div>`;
}

// ─── Mobile sidebar ───────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

// ─── Export / Import ──────────────────────────────────────────────────────────
function exportData() {
  const payload = { mastery: mastered, lich: lichData };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wf-mastery-backup.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (parsed.mastery) { mastered = parsed.mastery; localStorage.setItem('wf_mastery3', JSON.stringify(mastered)); }
      if (parsed.lich) { lichData = parsed.lich; localStorage.setItem('wf_lich', JSON.stringify(lichData)); }
      buildNav(); renderItems();
    } catch(err) { alert('Invalid backup file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ─── Actions ──────────────────────────────────────────────────────────────────
function toggle(id) {
  mastered[id] = !mastered[id];
  localStorage.setItem('wf_mastery3', JSON.stringify(mastered));
  buildNav();
  renderItems();
}
function setCategory(key) {
  activeCat = key; buildNav(); renderItems();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderItems();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
